services:
  - type: web
    name: ai-chat-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 10000

  - type: web
    name: ai-chat-ui
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/chat-ui run build
    startCommand: npx serve -s artifacts/chat-ui/dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production
