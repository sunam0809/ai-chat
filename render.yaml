services:
  - type: web
    name: ai-chat
    runtime: node
    region: singapore
    plan: free
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/chat-ui run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PORT
        value: "10000"
