services:
  - type: web
    name: ai-chat
    env: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && NODE_ENV=production BASE_PATH=/ PORT=3000 pnpm --filter @workspace/chat-ui run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
